name: Build launcher exe

# Builds the standalone Windows launcher exe with PyInstaller. On a v* tag it
# also attaches the exe to the matching GitHub Release; on manual runs it just
# uploads a build artifact for testing.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create/attach the release on tag builds

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install "pyinstaller>=6,<7"

      - name: Build exe
        run: pyinstaller --clean --noconfirm microdrop_setup.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: microdrop_setup-windows
          path: dist/microdrop_setup.exe

      - name: Attach exe to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/microdrop_setup.exe
