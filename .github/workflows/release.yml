name: Build launcher binaries

# Builds the standalone launcher with PyInstaller for Windows, Linux, and
# macOS (arm64 + intel). On a v* tag the binaries are attached to the matching
# GitHub Release; on manual runs they are just uploaded as build artifacts.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create/attach the release on tag builds

jobs:
  build:
    name: build (${{ matrix.asset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: microdrop_setup.exe
          - os: ubuntu-latest
            asset: microdrop_setup-linux-x86_64
          - os: macos-latest
            asset: microdrop_setup-macos-arm64
          - os: macos-15-intel
            asset: microdrop_setup-macos-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Tk runtime (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libtk8.6

      # The launcher GUI is tkinter-based; fail early if this Python lacks it.
      - name: Verify tkinter
        run: python -c "import tkinter; print(tkinter.TkVersion)"

      - name: Install PyInstaller
        run: pip install "pyinstaller>=6,<7"

      - name: Build binary
        run: pyinstaller --clean --noconfirm microdrop_setup.spec

      - name: Rename to platform asset name
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mv dist/microdrop_setup "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
